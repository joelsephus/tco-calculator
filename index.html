// ─── Formula Engine ─────────────────────────────────────────
function loadedHourlyCost(salary, mult, hours = 2080) {
  if (hours <= 0) return 0;
  return (Math.max(0, salary) * mult) / hours;
}

function valuePerHour(org, loadedHourly) {
  const rev = parseFloat(org.annualRevenue);
  if (rev > 0 && org.totalEmployees > 0 && org.annualWorkHours > 0) {
    const rpe = rev / org.totalEmployees;
    return (rpe * org.billableUtilization) / org.annualWorkHours;
  }
  return loadedHourly * org.valueMultiplier;
}

function calcTicket(inputs, org) {
  const custLoaded = loadedHourlyCost(inputs.customerSalary, org.benefitsMultiplier, org.annualWorkHours);
  const custValue = valuePerHour(org, custLoaded);
  const custHours = (inputs.customerTime + inputs.holdTime + (inputs.includeContextSwitch ? org.contextSwitchMinutes : 0)) / 60;

  const supLoaded = loadedHourlyCost(inputs.supportSalary, org.benefitsMultiplier, org.annualWorkHours);
  const supValue = valuePerHour(org, supLoaded);
  const supHours = inputs.supportTime / 60;

  // Advanced factors (default to zero impact if not provided)
  const adv = inputs.advanced || {};

  // Multi-touch: additional support contacts beyond the first
  const avgTouches = adv.avgSupportTouches || 1;
  const multiTouchMultiplier = avgTouches;

  // Repeat contacts: tickets that don't resolve on first contact
  const fcrRate = (adv.firstContactResolutionPct || 100) / 100;
  const repeatMultiplier = fcrRate < 1 ? 1 + (1 - fcrRate) : 1; // unresolved tickets generate another contact

  // Workaround labor: invisible cost from people who don't call
  const workaroundPct = (adv.workaroundPct || 0) / 100;
  const workaroundMinutes = adv.workaroundMinutes || 0;
  const workaroundCostPerTicket = (workaroundPct > 0 && workaroundPct < 1)
    ? (custValue * workaroundMinutes / 60) * (workaroundPct / (1 - workaroundPct))
    : 0;

  // Error/rework: downstream errors caused by the issue
  const errorRate = (adv.errorRatePct || 0) / 100;
  const reworkCostPerError = adv.reworkCostPerError || 0;
  const errorReworkCost = errorRate * reworkCostPerError;

  // Management overhead: supervisor time per escalation
  const escalationRate = (adv.escalationRatePct || 0) / 100;
  const mgrMinutes = adv.mgrMinutesPerEscalation || 0;
  const mgrLoaded = adv.mgrSalary ? loadedHourlyCost(adv.mgrSalary, org.benefitsMultiplier, org.annualWorkHours) : 0;
  const mgrCostPerTicket = escalationRate * (mgrLoaded * mgrMinutes / 60);

  // Overtime/backlog: work that must be caught up later
  const overtimePct = (adv.overtimePct || 0) / 100;
  const overtimeMultiplier = adv.overtimeRate || 1.5;
  const overtimeCost = overtimePct > 0 ? custLoaded * custHours * overtimePct * (overtimeMultiplier - 1) : 0;

  // Apply multi-touch and repeat multipliers to support cost
  const adjSupportDirect = supLoaded * supHours * multiTouchMultiplier * repeatMultiplier;
  const adjSupportOpportunity = (supValue - supLoaded) * supHours * multiTouchMultiplier * repeatMultiplier;
  const adjSupportTotal = supValue * supHours * multiTouchMultiplier * repeatMultiplier;

  const advancedTotal = workaroundCostPerTicket + errorReworkCost + mgrCostPerTicket + overtimeCost;
  const hasAdvanced = advancedTotal > 0;

  return {
    customerDirect: custLoaded * custHours,
    customerOpportunity: (custValue - custLoaded) * custHours,
    customerTotal: custValue * custHours,
    supportDirect: adjSupportDirect,
    supportOpportunity: adjSupportOpportunity,
    supportTotal: adjSupportTotal,
    resourceCost: inputs.resourceCost || 0,
    // Advanced factor breakdowns
    workaroundCost: workaroundCostPerTicket,
    errorReworkCost: errorReworkCost,
    mgrOverheadCost: mgrCostPerTicket,
    overtimeCost: overtimeCost,
    advancedTotal: advancedTotal,
    hasAdvanced: hasAdvanced,
    get perTicketDirect() { return this.customerDirect + this.supportDirect + this.resourceCost; },
    get perTicketOpportunity() { return this.customerOpportunity + this.supportOpportunity; },
    get perTicketTotal() { return this.customerTotal + this.supportTotal + this.resourceCost + this.advancedTotal; },
    get annualDirect() { return this.perTicketDirect * inputs.annualTickets; },
    get annualOpportunity() { return this.perTicketOpportunity * inputs.annualTickets; },
    get annualTotal() { return this.perTicketTotal * inputs.annualTickets; },
    get annualAdvanced() { return this.advancedTotal * inputs.annualTickets; },
  };
}

function calcROI(inputs) {
  const annualSavings = inputs.currentAnnualCost * (inputs.improvementPct / 100) * inputs.confidenceFactor;
  const netAnnualBenefit = annualSavings - inputs.annualRecurringCost;
  const paybackMonths = netAnnualBenefit > 0 ? inputs.oneTimeInvestment / (netAnnualBenefit / 12) : Infinity;
  const years = [1, 2, 3, 5];
  const npvResults = {};
  const roiResults = {};
  for (const n of years) {
    let pvBenefits = 0;
    for (let y = 1; y <= n; y++) pvBenefits += netAnnualBenefit / Math.pow(1 + inputs.discountRate, y);
    npvResults[n] = -inputs.oneTimeInvestment + pvBenefits;
    const totalBenefits = netAnnualBenefit * n;
    const totalCosts = inputs.oneTimeInvestment + inputs.annualRecurringCost * n;
    roiResults[n] = totalCosts > 0 ? ((totalBenefits - totalCosts) / totalCosts) * 100 : 0;
  }
  return { annualSavings, netAnnualBenefit, paybackMonths, npvResults, roiResults };
}

function calcImplementation(inputs, org) {
  const directCosts = inputs.softwareOnetime + inputs.services + inputs.firstYearLicensing;
  const internalLoaded = loadedHourlyCost(inputs.internalSalary, org.benefitsMultiplier, org.annualWorkHours);
  const laborCost = inputs.internalHours * internalLoaded;
  const traineeLoaded = loadedHourlyCost(inputs.traineeSalary, org.benefitsMultiplier, org.annualWorkHours);
  const trainingCost = inputs.trainingHoursPerPerson * inputs.numTrainees * traineeLoaded;
  const affectedLoaded = loadedHourlyCost(inputs.affectedSalary, org.benefitsMultiplier, org.annualWorkHours);
  const weeklyHours = org.annualWorkHours / 52;
  const productivityLoss = inputs.affectedEmployees * affectedLoaded * weeklyHours * (inputs.productivityDipPct / 100) * inputs.transitionWeeks;
  const year1Total = directCosts + laborCost + trainingCost + productivityLoss;
  const ongoingAnnual = inputs.recurringLicensing + inputs.ongoingSupport;
  const fiveYearTotal = year1Total + ongoingAnnual * 4;
  const hiddenPct = year1Total > 0 ? ((trainingCost + productivityLoss) / year1Total) * 100 : 0;
  return { directCosts, laborCost, trainingCost, productivityLoss, year1Total, ongoingAnnual, fiveYearTotal, hiddenPct };
}

function calcDowntime(inputs, org) {
  const loaded = loadedHourlyCost(inputs.avgSalary, org.benefitsMultiplier, org.annualWorkHours);
  const val = valuePerHour(org, loaded);
  const lostProdDirect = inputs.affectedEmployees * loaded * inputs.downtimeHours;
  const lostProdTotal = inputs.affectedEmployees * val * inputs.downtimeHours;
  const rev = parseFloat(org.annualRevenue);
  const lostRevenue = (rev > 0 && org.annualWorkHours > 0) ? (rev / org.annualWorkHours) * inputs.downtimeHours * (inputs.revenueImpactPct / 100) : 0;
  const eventDirect = lostProdDirect + lostRevenue + inputs.recoveryCosts;
  const eventTotal = lostProdTotal + lostRevenue + inputs.recoveryCosts;
  return {
    lostProdDirect, lostProdTotal,
    lostRevenue,
    recoveryCosts: inputs.recoveryCosts,
    eventDirect, eventTotal,
    annualDirect: eventDirect * inputs.eventsPerYear,
    annualTotal: eventTotal * inputs.eventsPerYear,
  };
}

// ─── Utility Components ─────────────────────────────────────
const fmt = (v) => !isFinite(v) ? "—" : new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);
const fmtD = (v) => !isFinite(v) ? "—" : new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v);
const fmtPct = (v) => !isFinite(v) ? "—" : `${v.toFixed(1)}%`;
const fmtNum = (v) => !isFinite(v) ? "—" : new Intl.NumberFormat("en-US").format(Math.round(v));

let _inputId = 0;
function Input({ label, value, onChange, type = "number", ...props }) {
  const [id] = useState(() => `input-${++_inputId}`);
  return (
    <div>
      <label htmlFor={id} className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
      <input id={id} type={type} value={value}
        onChange={(e) => onChange(type === "number" ? (parseFloat(e.target.value) || 0) : e.target.value)}
        {...(type === "number" ? { min: 0 } : {})}
        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" {...props} />
    </div>
  );
}

function Select({ label, value, onChange, options }) {
  const [id] = useState(() => `select-${++_inputId}`);
  return (
    <div>
      <label htmlFor={id} className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
      <select id={id} value={value} onChange={(e) => onChange(e.target.value)}
        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        {options.map((o) => <option key={o.value || o} value={o.value || o}>{o.label || o}</option>)}
      </select>
    </div>
  );
}

function CostRow({ label, direct, opportunity, total, bold = false }) {
  const cls = bold ? "font-bold text-base" : "text-sm";
  return (
    <tr className={cls}>
      <td className="py-1.5 pr-4 text-gray-700">{label}</td>
      <td className="py-1.5 px-3 text-right text-gray-600">{fmtD(direct)}</td>
      <td className="py-1.5 px-3 text-right text-amber-700">{fmtD(opportunity)}</td>
      <td className="py-1.5 px-3 text-right font-semibold text-gray-900">{fmtD(total)}</td>

}

function StatBox({ label, value, sublabel, color = "gray" }) {

      <div className={`text-xl font-bold ${textColor}`}>{value}</div>
      {sublabel && <div className="text-xs text-gray-400 mt-0.5">{sublabel}</div>}
    </div>

}

function ExecSummary({ generateText }) {
  const [open, setOpen] = useState(false);
  const [copied, setCopied] = useState(false);
  const text = open ? generateText() : "";
  const handleCopy = () => {
    navigator.clipboard.writeText(text);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  return (
    <div className="no-print">
      <button onClick={() => { setOpen(!open); setCopied(false); }}
        className="w-full px-4 py-2.5 bg-gray-700 text-white rounded-md text-sm hover:bg-gray-800 flex justify-between items-center">
        <span>📄 {open ? "Hide" : "Generate"} Executive Summary</span>
        <span>{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div className="mt-2 bg-gray-50 border border-gray-200 rounded-lg p-4">
          <pre className="whitespace-pre-wrap text-sm text-gray-700 font-sans leading-relaxed">{text}</pre>
          <button onClick={handleCopy}
            className="mt-3 px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700">
            {copied ? "✓ Copied!" : "📋 Copy to Clipboard"}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── Org Settings Panel ─────────────────────────────────────
function OrgSettings({ org, setOrg }) {
  const [open, setOpen] = useState(false);
  const parsedRev = parseFloat(org.annualRevenue);
  const revPerEmp = (parsedRev > 0 && org.totalEmployees > 0) ? parsedRev / org.totalEmployees : null;
  const exampleLoaded = loadedHourlyCost(55000, org.benefitsMultiplier, org.annualWorkHours);
  const exampleValue = valuePerHour(org, exampleLoaded);

  return (
    <div className="mb-6 bg-white rounded-lg shadow-sm border border-gray-200 no-print">
      <button onClick={() => setOpen(!open)} className="w-full flex justify-between items-center p-4 text-left hover:bg-gray-50">
        <div>
          <span className="font-semibold text-gray-700">⚙️ Organization Settings</span>
          <span className="text-sm text-gray-500 ml-3">{org.orgName} · {fmtNum(org.totalEmployees)} employees · {org.benefitsMultiplier}x benefits</span>
        </div>
        <span className="text-gray-400">{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div className="p-4 pt-0 border-t border-gray-100">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
            <Input label="Organization Name" type="text" value={org.orgName} onChange={(v) => setOrg({ ...org, orgName: v })} />
            <Input label="Total Employees" value={org.totalEmployees} onChange={(v) => setOrg({ ...org, totalEmployees: v })} />
            <Input label="Annual Revenue ($, optional)" value={org.annualRevenue} onChange={(v) => setOrg({ ...org, annualRevenue: v })} />
            <Input label="Annual Work Hours" value={org.annualWorkHours} onChange={(v) => setOrg({ ...org, annualWorkHours: v })} />
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Benefits Multiplier: {org.benefitsMultiplier}x</label>
              <input type="range" min="1.0" max="2.0" step="0.05" value={org.benefitsMultiplier}
                onChange={(e) => setOrg({ ...org, benefitsMultiplier: parseFloat(e.target.value) })} className="w-full" />
              <div className="flex justify-between text-xs text-gray-400"><span>1.0x</span><span>2.0x</span></div>
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Value Multiplier: {org.valueMultiplier}x</label>
              <input type="range" min="1.0" max="4.0" step="0.1" value={org.valueMultiplier}
                onChange={(e) => setOrg({ ...org, valueMultiplier: parseFloat(e.target.value) })} className="w-full" />
              <div className="flex justify-between text-xs text-gray-400"><span>1.0x (conservative)</span><span>4.0x</span></div>
            </div>
            <Input label="Billable Utilization %" value={Math.round(org.billableUtilization * 100)}
              onChange={(v) => setOrg({ ...org, billableUtilization: v / 100 })} />
            <Input label="Context Switch Penalty (min)" value={org.contextSwitchMinutes}
              onChange={(v) => setOrg({ ...org, contextSwitchMinutes: v })} />
          </div>
          <div className="bg-gray-50 rounded-lg p-3 text-sm text-gray-600 grid grid-cols-2 md:grid-cols-4 gap-3">
            <div><span className="font-medium">Example ($55K clinical):</span></div>
            <div>Loaded hourly: <strong>{fmtD(exampleLoaded)}</strong></div>
            <div>Value/hour: <strong>{fmtD(exampleValue)}</strong> {!org.annualRevenue && <span className="text-xs text-amber-600">(multiplier-based)</span>}</div>
            {revPerEmp && <div>Revenue/employee: <strong>{fmt(revPerEmp)}</strong></div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Tab 1: Recurring Issue Cost ────────────────────────────
function RecurringIssueTab({ org }) {
  const [inputs, setInputs] = useState({
    problemName: "Password Reset Issues",
    customerRole: "Clinical Staff",
    customerSalary: 55000,
    customerTime: 10,
    holdTime: 15,
    includeContextSwitch: true,
    supportTier: "Tier 1 Support",
    supportSalary: 35000,
    supportTime: 5,
    resourceCost: 0,
    annualTickets: 500,
    reductionPct: 10,
    advanced: {
      avgSupportTouches: 1,
      firstContactResolutionPct: 100,
      workaroundPct: 0,
      workaroundMinutes: 0,
      errorRatePct: 0,
      reworkCostPerError: 0,
      escalationRatePct: 0,
      mgrMinutesPerEscalation: 0,
      mgrSalary: 85000,
      overtimePct: 0,
      overtimeRate: 1.5,
    },
  });
  const [advOpen, setAdvOpen] = useState(false);

  const set = (field, value) => setInputs((p) => ({ ...p, [field]: value }));
  const setAdv = (field, value) => setInputs((p) => ({ ...p, advanced: { ...p.advanced, [field]: value } }));

  const handleRoleChange = (role) => {
    const r = ROLES.find((r) => r.name === role);
    set("customerRole", role);
    if (r) set("customerSalary", r.defaultSalary);
  };

  const handleTierChange = (tier) => {
    const t = SUPPORT_TIERS.find((t) => t.name === tier);
    set("supportTier", tier);
    if (t) set("supportSalary", t.defaultSalary);
  };

  const applyTemplate = (templateName) => {
    if (!templateName) return;
    const t = TEMPLATES.find((t) => t.name === templateName);
    if (!t) return;
    setInputs((p) => ({
      ...p,
      problemName: t.problemName,
      customerRole: t.customerRole,
      customerSalary: t.customerSalary,
      customerTime: t.customerTime,
      holdTime: t.holdTime,
      supportTier: t.supportTier,
      supportSalary: t.supportSalary,
      supportTime: t.supportTime,
      resourceCost: t.resourceCost,
      annualTickets: t.annualTickets,
    }));
  };

  const r = useMemo(() => calcTicket(inputs, org), [inputs, org]);

  const copyResults = () => {
    const lines = [
      `TCO Analysis: ${inputs.problemName}`,
      `Date: ${new Date().toLocaleDateString()}`,
      `Org: ${org.orgName}`,
      "",
      "PER TICKET BREAKDOWN",
      `${"".padEnd(25)} ${"Direct".padStart(12)} ${"Opp. Cost".padStart(12)} ${"Total".padStart(12)}`,
      `${"Customer Cost".padEnd(25)} ${fmtD(r.customerDirect).padStart(12)} ${fmtD(r.customerOpportunity).padStart(12)} ${fmtD(r.customerTotal).padStart(12)}`,
      `${"Support Cost".padEnd(25)} ${fmtD(r.supportDirect).padStart(12)} ${fmtD(r.supportOpportunity).padStart(12)} ${fmtD(r.supportTotal).padStart(12)}`,
      `${"Resource Cost".padEnd(25)} ${fmtD(r.resourceCost).padStart(12)} ${"—".padStart(12)} ${fmtD(r.resourceCost).padStart(12)}`,
    ];
    if (r.hasAdvanced) {
      lines.push("", "HIDDEN COST FACTORS (per ticket)");
      if (r.workaroundCost > 0) lines.push(`${"  Workaround Labor".padEnd(25)} ${fmtD(r.workaroundCost).padStart(12)}`);
      if (r.errorReworkCost > 0) lines.push(`${"  Error/Rework".padEnd(25)} ${fmtD(r.errorReworkCost).padStart(12)}`);
      if (r.mgrOverheadCost > 0) lines.push(`${"  Mgmt Overhead".padEnd(25)} ${fmtD(r.mgrOverheadCost).padStart(12)}`);
      if (r.overtimeCost > 0) lines.push(`${"  Overtime/Backlog".padEnd(25)} ${fmtD(r.overtimeCost).padStart(12)}`);
      lines.push(`${"  TOTAL HIDDEN".padEnd(25)} ${fmtD(r.advancedTotal).padStart(12)}`);
    }
    lines.push(
      "",
      `${"TOTAL PER TICKET".padEnd(25)} ${fmtD(r.perTicketDirect).padStart(12)} ${fmtD(r.perTicketOpportunity).padStart(12)} ${fmtD(r.perTicketTotal).padStart(12)}`,
      "",
      `Annual Volume: ${fmtNum(inputs.annualTickets)} tickets`,
      `Annual Cost (Conservative): ${fmt(r.annualDirect)}`,
      `Annual Cost (Full Impact): ${fmt(r.annualTotal)}`,
    );
    if (r.hasAdvanced) lines.push(`Annual Hidden Costs: ${fmt(r.annualAdvanced)}`);
    lines.push("", `${inputs.reductionPct}% Reduction Value: ${fmt(r.annualTotal * inputs.reductionPct / 100)}/year`);
    lines.push("", "COST OF DELAY", `Monthly: ${fmt(r.annualTotal / 12)}`, `Weekly: ${fmt(r.annualTotal / 52)}`);
    navigator.clipboard.writeText(lines.join("\n"));
  };

  const generateExecSummary = () => {
    const date = new Date().toLocaleDateString();
    const totalTime = inputs.customerTime + inputs.holdTime + (inputs.includeContextSwitch ? org.contextSwitchMinutes : 0);
    return [
      `${org.orgName} is currently experiencing ${inputs.problemName}, generating approximately ${fmtNum(inputs.annualTickets)} support tickets annually. Each incident affects ${inputs.customerRole} staff (${fmt(inputs.customerSalary)} base salary) for ${totalTime} minutes and requires ${inputs.supportTier} resolution time of ${inputs.supportTime} minutes.`,
      "",
      `The total cost of this issue is ${fmt(r.annualTotal)} per year (${fmtD(r.perTicketTotal)} per ticket). Direct labor costs account for ${fmt(r.annualDirect)} annually, with an additional ${fmt(r.annualOpportunity)} in opportunity costs from lost productive capacity.${r.hasAdvanced ? ` Hidden factors including workarounds, errors, and management overhead add ${fmt(r.annualAdvanced)} annually.` : ""} Every month of inaction costs the organization ${fmt(r.annualTotal / 12)}.`,
      "",
      `Recommendation: A ${inputs.reductionPct}% reduction in ticket volume would save ${fmt(r.annualTotal * inputs.reductionPct / 100)} per year. Any solution costing less than this amount will deliver positive ROI within 12 months. We recommend proceeding to the Improvement ROI tab to model specific investment scenarios.`,

      `Analysis prepared ${date} using ${org.orgName} organizational parameters.`,

        <div className="bg-gray-50 p-4 rounded-lg space-y-3">
          <h3 className="font-semibold text-gray-700">Issue Details</h3>
          <Input label="Problem/Issue Name" type="text" value={inputs.problemName} onChange={(v) => set("problemName", v)} />

        </div>
        <div className="bg-gray-50 p-4 rounded-lg space-y-3">
          <h3 className="font-semibold text-gray-700">Customer Impact</h3>
          <Select label="Customer Role" value={inputs.customerRole} onChange={handleRoleChange}
            options={ROLES.map((r) => ({ value: r.name, label: `${r.name} (${fmt(r.defaultSalary)})` }))} />
          <Input label="Customer Base Salary" value={inputs.customerSalary} onChange={(v) => set("customerSalary", v)} />
          <Input label="Active Time with Issue (min)" value={inputs.customerTime} onChange={(v) => set("customerTime", v)} />
          <Input label="Hold/Wait Time (min)" value={inputs.holdTime} onChange={(v) => set("holdTime", v)} />
          <label className="flex items-center gap-2 text-sm text-gray-600">
            <input type="checkbox" checked={inputs.includeContextSwitch}
              onChange={(e) => set("includeContextSwitch", e.target.checked)} />

          </label>
        </div>
        <div className="bg-gray-50 p-4 rounded-lg space-y-3">
          <h3 className="font-semibold text-gray-700">IT Support Impact</h3>
          <Select label="Support Tier" value={inputs.supportTier} onChange={handleTierChange}
            options={SUPPORT_TIERS.map((t) => ({ value: t.name, label: `${t.name} (${fmt(t.defaultSalary)})` }))} />
          <Input label="Support Staff Base Salary" value={inputs.supportSalary} onChange={(v) => set("supportSalary", v)} />
          <Input label="Support Resolution Time (min)" value={inputs.supportTime} onChange={(v) => set("supportTime", v)} />
          <Input label="Additional Resource Cost per Ticket ($)" value={inputs.resourceCost} onChange={(v) => set("resourceCost", v)} />
        </div>

        <div className="bg-amber-50 border border-amber-200 rounded-lg overflow-hidden">
          <button onClick={() => setAdvOpen(!advOpen)}
            className="w-full flex justify-between items-center p-4 text-left hover:bg-amber-100 transition-colors">
            <div>
              <span className="font-semibold text-amber-800">🔍 Advanced Hidden Cost Factors</span>
              {r.hasAdvanced && <span className="text-sm text-amber-600 ml-2">+{fmtD(r.advancedTotal)}/ticket</span>}
            </div>
            <span className="text-amber-400">{advOpen ? "▲" : "▼"}</span>
          </button>
          {advOpen && (
            <div className="p-4 pt-0 space-y-4">
              <p className="text-xs text-amber-700">These factors capture costs that are typically invisible in standard TCO analysis. Leave at default values to exclude.</p>

              <div className="bg-white rounded-lg p-3 space-y-3">
                <h4 className="text-sm font-semibold text-gray-700">Repeat Contacts & Multi-Touch</h4>
                <div className="grid grid-cols-2 gap-3">
                  <Input label="First Contact Resolution %" value={inputs.advanced.firstContactResolutionPct}
                    onChange={(v) => setAdv("firstContactResolutionPct", v)} />
                  <Input label="Avg Support Staff per Ticket" value={inputs.advanced.avgSupportTouches}
                    onChange={(v) => setAdv("avgSupportTouches", v)} step="0.1" />
                </div>
                <p className="text-xs text-gray-500">If FCR is 70%, 30% of tickets generate a repeat contact. Avg touches &gt; 1 means escalation to multiple staff.</p>
              </div>

              <div className="bg-white rounded-lg p-3 space-y-3">
                <h4 className="text-sm font-semibold text-gray-700">Workaround Labor</h4>
                <div className="grid grid-cols-2 gap-3">
                  <Input label="% of Affected Who Work Around" value={inputs.advanced.workaroundPct}
                    onChange={(v) => setAdv("workaroundPct", v)} />
                  <Input label="Workaround Time (min each)" value={inputs.advanced.workaroundMinutes}
                    onChange={(v) => setAdv("workaroundMinutes", v)} />
                </div>
                <p className="text-xs text-gray-500">People who hit the same issue but don't call the help desk — they just lose time working around it. This is invisible ticket volume.</p>
              </div>

              <div className="bg-white rounded-lg p-3 space-y-3">
                <h4 className="text-sm font-semibold text-gray-700">Error / Rework Costs</h4>
                <div className="grid grid-cols-2 gap-3">
                  <Input label="Tickets Causing Errors (%)" value={inputs.advanced.errorRatePct}
                    onChange={(v) => setAdv("errorRatePct", v)} />
                  <Input label="Avg Rework Cost per Error ($)" value={inputs.advanced.reworkCostPerError}
                    onChange={(v) => setAdv("reworkCostPerError", v)} />

                <p className="text-xs text-gray-500">Downstream errors from the issue (wrong billing codes, duplicate data entry, incorrect documentation). Healthcare claim rework averages $25–$118/claim.</p>
              </div>

              <div className="bg-white rounded-lg p-3 space-y-3">
                <h4 className="text-sm font-semibold text-gray-700">Management Overhead</h4>
                <div className="grid grid-cols-3 gap-3">
                  <Input label="Escalation Rate (%)" value={inputs.advanced.escalationRatePct}
                    onChange={(v) => setAdv("escalationRatePct", v)} />
                  <Input label="Mgr Time per Escalation (min)" value={inputs.advanced.mgrMinutesPerEscalation}
                    onChange={(v) => setAdv("mgrMinutesPerEscalation", v)} />
                  <Input label="Manager Base Salary" value={inputs.advanced.mgrSalary}
                    onChange={(v) => setAdv("mgrSalary", v)} />
                </div>
                <p className="text-xs text-gray-500">Supervisor time spent on escalations, exceptions, approvals, and complaints related to this issue.</p>
              </div>

              <div className="bg-white rounded-lg p-3 space-y-3">
                <h4 className="text-sm font-semibold text-gray-700">Overtime / Backlog</h4>
                <div className="grid grid-cols-2 gap-3">
                  <Input label="% of Lost Work Requiring Catch-Up" value={inputs.advanced.overtimePct}
                    onChange={(v) => setAdv("overtimePct", v)} />
                  <Input label="Overtime Rate Multiplier" value={inputs.advanced.overtimeRate}
                    onChange={(v) => setAdv("overtimeRate", v)} step="0.1" />
                </div>
                <p className="text-xs text-gray-500">Work that didn't happen during the disruption still needs to get done — often at overtime rates (1.5x default).</p>
              </div>
            </div>
          )}
        </div>
      </div>

      <div className="space-y-4">
        <ResultCard title="Per-Ticket Cost Breakdown" icon="💰" color="blue">
          <table className="w-full">
            <thead>
              <tr className="text-xs text-gray-500 border-b">
                <th className="py-1 text-left">Component</th>
                <th className="py-1 px-3 text-right">Direct Cost</th>
                <th className="py-1 px-3 text-right">Opp. Cost</th>
                <th className="py-1 px-3 text-right">Total Impact</th>
              </tr>
            </thead>
            <tbody>
              <CostRow label="Customer Cost" direct={r.customerDirect} opportunity={r.customerOpportunity} total={r.customerTotal} />
              <CostRow label="Support Cost" direct={r.supportDirect} opportunity={r.supportOpportunity} total={r.supportTotal} />
              {r.resourceCost > 0 && <CostRow label="Resource Cost" direct={r.resourceCost} opportunity={0} total={r.resourceCost} />}
              {r.hasAdvanced && (
                <>
                  <tr><td colSpan={4} className="pt-2 pb-1"><span className="text-xs font-medium text-amber-700">Hidden Cost Factors</span></td></tr>
                  {r.workaroundCost > 0 && <tr className="text-sm text-amber-800">
                    <td className="py-1 pr-4">Workaround Labor</td><td className="py-1 px-3 text-right" colSpan={2}></td><td className="py-1 px-3 text-right font-semibold">{fmtD(r.workaroundCost)}</td>
                  </tr>}
                  {r.errorReworkCost > 0 && <tr className="text-sm text-amber-800">
                    <td className="py-1 pr-4">Error/Rework</td><td className="py-1 px-3 text-right" colSpan={2}></td><td className="py-1 px-3 text-right font-semibold">{fmtD(r.errorReworkCost)}</td>
                  </tr>}
                  {r.mgrOverheadCost > 0 && <tr className="text-sm text-amber-800">
                    <td className="py-1 pr-4">Mgmt Overhead</td><td className="py-1 px-3 text-right" colSpan={2}></td><td className="py-1 px-3 text-right font-semibold">{fmtD(r.mgrOverheadCost)}</td>
                  </tr>}
                  {r.overtimeCost > 0 && <tr className="text-sm text-amber-800">
                    <td className="py-1 pr-4">Overtime/Backlog</td><td className="py-1 px-3 text-right" colSpan={2}></td><td className="py-1 px-3 text-right font-semibold">{fmtD(r.overtimeCost)}</td>
                  </tr>}
                </>
              )}
              <tr><td colSpan={4}><hr className="my-1 border-gray-300" /></td></tr>
              <CostRow label="Total Per Ticket" direct={r.perTicketDirect} opportunity={r.perTicketOpportunity} total={r.perTicketTotal} bold />
            </tbody>
          </table>
        </ResultCard>

        <ResultCard title="Annual Impact" icon="📊" color="purple">
          <div className="grid grid-cols-2 gap-3">
            <StatBox label="Conservative (Direct Only)" value={fmt(r.annualDirect)} sublabel={`${fmtNum(inputs.annualTickets)} tickets × ${fmtD(r.perTicketDirect)}`} color="blue" />
            <StatBox label="Full Impact (Direct + Opp. + Hidden)" value={fmt(r.annualTotal)} sublabel={`${fmtNum(inputs.annualTickets)} tickets × ${fmtD(r.perTicketTotal)}`} color="purple" />
          </div>
          {r.hasAdvanced && (
            <div className="mt-3 p-3 bg-amber-50 rounded-lg border border-amber-200">
              <div className="text-xs font-medium text-amber-700 mb-2">Annual Hidden Cost Breakdown</div>
              <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-sm">
                {r.workaroundCost > 0 && <><span className="text-gray-600">Workaround Labor</span><span className="text-right font-semibold text-amber-700">{fmt(r.workaroundCost * inputs.annualTickets)}/yr</span></>}
                {r.errorReworkCost > 0 && <><span className="text-gray-600">Error/Rework</span><span className="text-right font-semibold text-amber-700">{fmt(r.errorReworkCost * inputs.annualTickets)}/yr</span></>}
                {r.mgrOverheadCost > 0 && <><span className="text-gray-600">Mgmt Overhead</span><span className="text-right font-semibold text-amber-700">{fmt(r.mgrOverheadCost * inputs.annualTickets)}/yr</span></>}
                {r.overtimeCost > 0 && <><span className="text-gray-600">Overtime/Backlog</span><span className="text-right font-semibold text-amber-700">{fmt(r.overtimeCost * inputs.annualTickets)}/yr</span></>}
                <span className="text-gray-700 font-medium pt-1 border-t border-amber-200">Total Hidden Costs</span>
                <span className="text-right font-bold text-amber-800 pt-1 border-t border-amber-200">{fmt(r.annualAdvanced)}/yr</span>
              </div>
            </div>
          )}
          <div className="mt-3 p-3 bg-white rounded-lg">
            <div className="text-xs text-gray-500 mb-1">Daily Cost to Organization</div>
            <div className="flex justify-between">
              <span className="text-sm text-gray-600">Conservative: <strong>{fmtD(r.annualDirect / (org.annualWorkHours / 8))}</strong>/day</span>
              <span className="text-sm text-gray-600">Full Impact: <strong>{fmtD(r.annualTotal / (org.annualWorkHours / 8))}</strong>/day</span>
            </div>
          </div>
        </ResultCard>

        <ResultCard title="Improvement Opportunities" icon="📈" color="green">
          <div className="mb-3">
            <label className="text-sm text-gray-600">
              Reduction target: <strong>{inputs.reductionPct}%</strong>
              ({fmtNum(Math.round(inputs.annualTickets * inputs.reductionPct / 100))} fewer tickets)
            </label>
            <input type="range" min="5" max="100" step="5" value={inputs.reductionPct}
              onChange={(e) => set("reductionPct", parseInt(e.target.value))} className="w-full" />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <StatBox label={`${inputs.reductionPct}% Reduction Saves`} value={`${fmt(r.annualTotal * inputs.reductionPct / 100)}/yr`} color="green" />
            <StatBox label="Break-Even Investment (1yr)" value={fmt(r.annualTotal * inputs.reductionPct / 100)}
              sublabel="Max spend that pays for itself in one year" color="green" />
          </div>
        </ResultCard>

        <ResultCard title="Cost of Delay" icon="⏰" color="red">
          <div className="grid grid-cols-2 gap-3 mb-3">
            <StatBox label="Monthly Cost of Inaction" value={fmt(r.annualTotal / 12)} color="red" />
            <StatBox label="Weekly Cost of Inaction" value={fmt(r.annualTotal / 52)} color="red" />
          </div>
          <p className="text-sm text-red-700 bg-red-50 rounded p-2">
            Every month this decision is delayed costs <strong>{fmt(r.annualTotal / 12)}</strong>.
            Over the next 6 months, that's <strong>{fmt(r.annualTotal / 2)}</strong> in preventable losses.
          </p>
        </ResultCard>

        <div className="flex gap-2 no-print">
          <button onClick={copyResults} className="px-4 py-2 bg-gray-600 text-white rounded-md text-sm hover:bg-gray-700">
            📋 Copy as Text
          </button>
        </div>

        <div className="text-xs text-gray-500 bg-gray-100 p-3 rounded-lg">
          <strong>Method:</strong> Direct Cost = Loaded Hourly × Wasted Hours. Opportunity Cost = (Value/Hr − Loaded/Hr) × Wasted Hours.
          Total customer time: {inputs.customerTime + inputs.holdTime + (inputs.includeContextSwitch ? org.contextSwitchMinutes : 0)} min.
          {!org.annualRevenue && " Value/Hr uses multiplier method (enter org revenue for revenue-based calculation)."}
        </div>

        <ExecSummary generateText={generateExecSummary} />
      </div>
    </div>
  );
}

// ─── Tab 2: Improvement ROI ─────────────────────────────────
function ImprovementROITab({ org }) {
  const [inputs, setInputs] = useState({
    scenarioName: "Fix Password Reset Issues",
    currentAnnualCost: 50000,
    oneTimeInvestment: 25000,
    annualRecurringCost: 5000,
    improvementPct: 50,
    confidenceFactor: 0.8,
    discountRate: org.discountRate,
  });
  const set = (field, value) => setInputs((p) => ({ ...p, [field]: value }));

  // Sync discount rate when org settings change
  useEffect(() => {
    setInputs((p) => ({ ...p, discountRate: org.discountRate }));
  }, [org.discountRate]);

  const r = useMemo(() => calcROI(inputs), [inputs]);

  const sensitivity = useMemo(() => {
    const scenarios = [
      { label: "Pessimistic (-30%)", factor: 0.7, color: "amber" },
      { label: "Expected", factor: 1.0, color: "blue" },
      { label: "Optimistic (+30%)", factor: 1.3, color: "green" },
    ];
    return scenarios.map((s) => {
      const adjInputs = { ...inputs, improvementPct: Math.min(100, inputs.improvementPct * s.factor) };
      const res = calcROI(adjInputs);
      return { ...s, npv3: res.npvResults[3], payback: res.paybackMonths, roi3: res.roiResults[3] };
    });
  }, [inputs]);

  const confidenceLabels = { 0.6: "Conservative", 0.8: "Moderate", 1.0: "Aggressive" };
  const closestLabel = confidenceLabels[inputs.confidenceFactor] || `${Math.round(inputs.confidenceFactor * 100)}%`;

  const generateExecSummary = () => {
    const date = new Date().toLocaleDateString();
    const paybackStr = r.paybackMonths === Infinity ? "does not achieve payback" : `achieves payback in ${r.paybackMonths.toFixed(1)} months`;
    return [
      `This analysis evaluates "${inputs.scenarioName}", a proposed investment of ${fmt(inputs.oneTimeInvestment)} (one-time) plus ${fmt(inputs.annualRecurringCost)}/year recurring to address a current annual cost of ${fmt(inputs.currentAnnualCost)}. The expected improvement is ${inputs.improvementPct}% at ${closestLabel} confidence (${Math.round(inputs.confidenceFactor * 100)}%).`,
      "",
      `The investment generates ${fmt(r.annualSavings)} in annual savings (${fmt(r.netAnnualBenefit)} net of recurring costs) and ${paybackStr}. The 3-year NPV is ${fmt(r.npvResults[3])} with a 3-year ROI of ${fmtPct(r.roiResults[3])}. The 5-year NPV is ${fmt(r.npvResults[5])}.`,
      "",
      r.paybackMonths <= 12
        ? `Recommendation: This is a strong investment that pays for itself in under a year. Every month of delay costs ${fmt(r.netAnnualBenefit / 12)} in unrealized savings. We recommend immediate approval and implementation.`
        : r.paybackMonths <= 36
        ? `Recommendation: This investment shows reasonable returns with payback in ${r.paybackMonths.toFixed(0)} months. Consider strategic alignment and non-financial benefits when making the final decision.`
        : `Recommendation: The extended payback period suggests this investment should be re-evaluated. Consider reducing scope, negotiating better pricing, or identifying additional benefit streams.`,
      "",
      `Analysis prepared ${date} using ${org.orgName} organizational parameters (${fmtPct(inputs.discountRate * 100)} discount rate).`,
    ].join("\n");
  };

  return (
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div className="space-y-4">
        <div className="bg-gray-50 p-4 rounded-lg space-y-3">
          <h3 className="font-semibold text-gray-700">Scenario</h3>
          <Input label="Scenario Name" type="text" value={inputs.scenarioName} onChange={(v) => set("scenarioName", v)} />
          <Input label="Current Annual Cost (from Tab 1 or manual)" value={inputs.currentAnnualCost} onChange={(v) => set("currentAnnualCost", v)} />
        </div>
        <div className="bg-gray-50 p-4 rounded-lg space-y-3">
          <h3 className="font-semibold text-gray-700">Proposed Solution</h3>
          <Input label="One-Time Investment ($)" value={inputs.oneTimeInvestment} onChange={(v) => set("oneTimeInvestment", v)} />
          <Input label="Annual Recurring Cost ($)" value={inputs.annualRecurringCost} onChange={(v) => set("annualRecurringCost", v)} />
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Expected Improvement: {inputs.improvementPct}%</label>
            <input type="range" min="5" max="100" step="5" value={inputs.improvementPct}
              onChange={(e) => set("improvementPct", parseInt(e.target.value))} className="w-full" />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Confidence Level: {closestLabel} ({Math.round(inputs.confidenceFactor * 100)}%)</label>
            <input type="range" min="0.4" max="1.0" step="0.1" value={inputs.confidenceFactor}
              onChange={(e) => set("confidenceFactor", parseFloat(e.target.value))} className="w-full" />
            <div className="flex justify-between text-xs text-gray-400"><span>Conservative (40%)</span><span>Aggressive (100%)</span></div>
          </div>
          <Input label="Discount Rate (%)" value={Math.round(inputs.discountRate * 100)}
            onChange={(v) => set("discountRate", v / 100)} />
        </div>
      </div>

      <div className="space-y-4">
        <ResultCard title="Annual Benefit" icon="💵" color="green">
          <div className="grid grid-cols-2 gap-3">
            <StatBox label="Annual Savings (adjusted)" value={fmt(r.annualSavings)} sublabel={`${inputs.improvementPct}% × ${Math.round(inputs.confidenceFactor * 100)}% confidence`} color="green" />
            <StatBox label="Net Annual Benefit" value={fmt(r.netAnnualBenefit)} sublabel={`Savings minus ${fmt(inputs.annualRecurringCost)}/yr recurring`} color={r.netAnnualBenefit > 0 ? "green" : "red"} />
          </div>
        </ResultCard>

        <ResultCard title="Payback & ROI" icon="🎯" color="blue">
          <div className="grid grid-cols-2 gap-3 mb-3">
            <StatBox label="Simple Payback Period" value={r.paybackMonths === Infinity ? "Never" : `${r.paybackMonths.toFixed(1)} months`}
              color={r.paybackMonths <= 24 ? "green" : r.paybackMonths <= 60 ? "amber" : "red"} />
            <StatBox label="3-Year ROI" value={r.roiResults[3] !== undefined ? fmtPct(r.roiResults[3]) : "—"} color={r.roiResults[3] > 0 ? "green" : "red"} />
          </div>
          <table className="w-full text-sm">
            <thead><tr className="text-xs text-gray-500 border-b">
              <th className="py-1 text-left">Horizon</th><th className="py-1 text-right">NPV</th><th className="py-1 text-right">ROI</th>
            </tr></thead>
            <tbody>
              {[1, 2, 3, 5].map((y) => (
                <tr key={y} className={r.npvResults[y] >= 0 ? "text-green-700" : "text-red-600"}>
                  <td className="py-1">{y}-year</td>
                  <td className="py-1 text-right">{fmt(r.npvResults[y])}</td>
                  <td className="py-1 text-right">{fmtPct(r.roiResults[y])}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </ResultCard>

        <ResultCard title="Decision Summary" icon="📝" color={r.npvResults[3] > 0 ? "green" : "red"}>
          <div className="text-sm text-gray-700 space-y-2">
            {r.paybackMonths <= 12 && <p>✅ <strong>Strong investment.</strong> Pays for itself in under 12 months.</p>}
            {r.paybackMonths > 12 && r.paybackMonths <= 36 && <p>🟡 <strong>Reasonable investment.</strong> Payback in {r.paybackMonths.toFixed(0)} months — confirm strategic alignment.</p>}
            {r.paybackMonths > 36 && r.paybackMonths < Infinity && <p>⚠️ <strong>Long payback ({r.paybackMonths.toFixed(0)} months).</strong> Consider whether non-financial benefits justify the investment.</p>}
            {r.paybackMonths === Infinity && <p>🚫 <strong>Negative return.</strong> Annual savings don't cover recurring costs. Re-evaluate scope or cost.</p>}
            <p className="text-xs text-gray-500">
              Investing {fmt(inputs.oneTimeInvestment)} to address an annual {fmt(inputs.currentAnnualCost)} problem.
              At {inputs.improvementPct}% improvement ({closestLabel} confidence), 3-year NPV = {fmt(r.npvResults[3])}.
            </p>
          </div>
        </ResultCard>

        <ResultCard title="Sensitivity Analysis" icon="📊" color="blue">
          <p className="text-xs text-gray-500 mb-3">What if the improvement % is higher or lower than expected?</p>
          <div className="space-y-3">
            {sensitivity.map((s) => {
              const maxNpv = Math.max(...sensitivity.map((x) => Math.abs(x.npv3)), 1);
              const barWidth = Math.max(5, Math.abs(s.npv3) / maxNpv * 100);
              const barColor = { amber: "bg-amber-400", blue: "bg-blue-500", green: "bg-green-500" }[s.color];
              return (
                <div key={s.label}>
                  <div className="flex justify-between text-sm mb-1">
                    <span className="text-gray-700 font-medium">{s.label}</span>
                    <span className="text-gray-500">Improvement: {fmtPct(Math.min(100, inputs.improvementPct * s.factor))}</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex-1 bg-gray-200 rounded-full h-6 overflow-hidden">
                      <div className={`h-full rounded-full ${barColor} transition-all duration-300`} style={{ width: `${barWidth}%` }}></div>
                    </div>
                    <span className={`text-sm font-bold whitespace-nowrap ${s.npv3 >= 0 ? "text-green-700" : "text-red-600"}`}>{fmt(s.npv3)}</span>
                  </div>
                  <div className="text-xs text-gray-400 mt-0.5">
                    Payback: {s.payback === Infinity ? "Never" : `${s.payback.toFixed(1)} mo`} · 3-yr ROI: {fmtPct(s.roi3)}
                  </div>
                </div>
              );
            })}
          </div>
          {sensitivity[0].npv3 > 0 && (
            <p className="text-sm text-green-700 bg-green-50 rounded p-2 mt-3">
              Even in the pessimistic scenario, this investment has a positive 3-year NPV of {fmt(sensitivity[0].npv3)}.
            </p>
          )}
          {sensitivity[0].npv3 <= 0 && sensitivity[1].npv3 > 0 && (
            <p className="text-sm text-amber-700 bg-amber-50 rounded p-2 mt-3">
              The expected case is positive, but a 30% underperformance would result in negative NPV. Consider risk mitigation strategies.
            </p>
          )}
        </ResultCard>

        {r.netAnnualBenefit > 0 && (
          <ResultCard title="Cost of Delay" icon="⏰" color="red">
            <div className="grid grid-cols-2 gap-3 mb-3">
              <StatBox label="Monthly Unrealized Savings" value={fmt(r.netAnnualBenefit / 12)} color="red" />
              <StatBox label="Weekly Unrealized Savings" value={fmt(r.netAnnualBenefit / 52)} color="red" />
            </div>
            <p className="text-sm text-red-700 bg-red-50 rounded p-2">
              Every month you delay this investment costs <strong>{fmt(r.netAnnualBenefit / 12)}</strong> in unrealized savings.
              A 6-month delay means <strong>{fmt(r.netAnnualBenefit / 2)}</strong> left on the table.
            </p>
          </ResultCard>
        )}

        <ExecSummary generateText={generateExecSummary} />
      </div>
    </div>
  );
}

// ─── Tab 5: Compare Options ──────────────────────────────────
function CompareTab({ org }) {
  const defaultOpt = {
    role: "Clinical Staff", salary: 55000, timePerTicket: 25, supportTime: 10,
    annualTickets: 500, solutionOneTime: 0, solutionRecurring: 0, improvementPct: 0,
  };
  const [options, setOptions] = useState([
    { name: "Do Nothing", ...defaultOpt, isBaseline: true },
    { name: "Option A", ...defaultOpt, solutionOneTime: 25000, solutionRecurring: 5000, improvementPct: 50 },
    { name: "Option B", ...defaultOpt, solutionOneTime: 75000, solutionRecurring: 2000, improvementPct: 80 },
  ]);

  const setOpt = (idx, field, value) => {
    setOptions((prev) => prev.map((o, i) => i === idx ? { ...o, [field]: value } : o));
  };

  const results = useMemo(() => {
    return options.map((opt) => {
      const ticketInputs = {
        customerSalary: opt.salary, customerTime: opt.timePerTicket, holdTime: 0,
        includeContextSwitch: false, supportSalary: 35000, supportTime: opt.supportTime,
        resourceCost: 0, annualTickets: opt.annualTickets, advanced: {},
      };
      const ticket = calcTicket(ticketInputs, org);
      const currentAnnualCost = ticket.annualTotal;
      const costPerTicket = ticket.perTicketTotal;

      if (opt.isBaseline) {
        return { costPerTicket, currentAnnualCost, annualSavings: 0, paybackMonths: Infinity, npv3: 0, threeYearTotalCost: currentAnnualCost * 3 };
      }

      const roiInputs = {
        currentAnnualCost, oneTimeInvestment: opt.solutionOneTime,
        annualRecurringCost: opt.solutionRecurring, improvementPct: opt.improvementPct,
        confidenceFactor: 1.0, discountRate: org.discountRate,
      };
      const roi = calcROI(roiInputs);
      const threeYearTotalCost = currentAnnualCost * 3 - roi.annualSavings * 3 + opt.solutionOneTime + opt.solutionRecurring * 3;
      return { costPerTicket, currentAnnualCost, annualSavings: roi.annualSavings, paybackMonths: roi.paybackMonths, npv3: roi.npvResults[3], threeYearTotalCost };
    });
  }, [options, org]);

  const bestIdx = results.reduce((best, r, i) => r.threeYearTotalCost < results[best].threeYearTotalCost ? i : best, 0);

  const metrics = [
    { label: "Cost per Ticket", key: "costPerTicket", format: fmtD },
    { label: "Annual Cost", key: "currentAnnualCost", format: fmt },
    { label: "Annual Savings", key: "annualSavings", format: fmt },
    { label: "Payback Period", key: "paybackMonths", format: (v) => v === Infinity ? "N/A" : `${v.toFixed(1)} mo` },
    { label: "3-Year NPV", key: "npv3", format: fmt },
    { label: "3-Year Total Cost", key: "threeYearTotalCost", format: fmt },
  ];

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {options.map((opt, idx) => (
          <div key={idx} className={`bg-gray-50 p-4 rounded-lg space-y-3 border-2 ${idx === bestIdx ? "border-green-400 bg-green-50" : "border-transparent"}`}>
            <Input label="Option Name" type="text" value={opt.name} onChange={(v) => setOpt(idx, "name", v)} />
            <Select label="Role" value={opt.role} onChange={(v) => { setOpt(idx, "role", v); const r = ROLES.find((r) => r.name === v); if (r) setOpt(idx, "salary", r.defaultSalary); }}
              options={ROLES.map((r) => ({ value: r.name, label: `${r.name} (${fmt(r.defaultSalary)})` }))} />
            <Input label="Base Salary" value={opt.salary} onChange={(v) => setOpt(idx, "salary", v)} />
            <Input label="Time per Ticket (min)" value={opt.timePerTicket} onChange={(v) => setOpt(idx, "timePerTicket", v)} />
            <Input label="Support Time (min)" value={opt.supportTime} onChange={(v) => setOpt(idx, "supportTime", v)} />
            <Input label="Annual Tickets" value={opt.annualTickets} onChange={(v) => setOpt(idx, "annualTickets", v)} />
            {!opt.isBaseline && (
              <>
                <hr className="border-gray-300" />
                <h4 className="text-sm font-semibold text-gray-600">Solution Investment</h4>
                <Input label="One-Time Cost ($)" value={opt.solutionOneTime} onChange={(v) => setOpt(idx, "solutionOneTime", v)} />
                <Input label="Annual Recurring ($)" value={opt.solutionRecurring} onChange={(v) => setOpt(idx, "solutionRecurring", v)} />
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Expected Improvement: {opt.improvementPct}%</label>
                  <input type="range" min="0" max="100" step="5" value={opt.improvementPct}
                    onChange={(e) => setOpt(idx, "improvementPct", parseInt(e.target.value))} className="w-full" />
                </div>
              </>
            )}
            {idx === bestIdx && (
              <div className="text-center text-sm font-bold text-green-700 bg-green-100 rounded p-2">★ Best Option</div>
            )}
          </div>
        ))}
      </div>

      <ResultCard title="Comparison Results" icon="⚖️" color="blue">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-xs text-gray-500 border-b">
                <th className="py-2 text-left">Metric</th>
                {options.map((opt, i) => (
                  <th key={i} className={`py-2 text-right ${i === bestIdx ? "text-green-700" : ""}`}>{opt.name}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {metrics.map((metric) => (
                <tr key={metric.label} className="border-b border-gray-100">
                  <td className="py-2 text-gray-700 font-medium">{metric.label}</td>
                  {results.map((r, i) => (
                    <td key={i} className={`py-2 text-right ${i === bestIdx ? "font-bold text-green-700" : ""}`}>
                      {metric.format(r[metric.key])}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </ResultCard>
    </div>
  );
}

      if (!saved) return { ...DEFAULT_ORG, _v: SCHEMA_VERSION };
      const parsed = JSON.parse(saved);
      if (!parsed._v || parsed._v < SCHEMA_VERSION) return { ...DEFAULT_ORG, _v: SCHEMA_VERSION };
      return { ...DEFAULT_ORG, ...parsed, _v: SCHEMA_VERSION };
    } catch { return { ...DEFAULT_ORG, _v: SCHEMA_VERSION }; }
  });

  const [activeTab, setActiveTab] = useState("recurring");

  useEffect(() => {
    localStorage.setItem("tco_org_settings", JSON.stringify(org));
  }, [org]);

  const tabs = [
    { id: "recurring", label: "Recurring Issue Cost", icon: "🔄" },
    { id: "roi", label: "Improvement ROI", icon: "📈" },
    { id: "implementation", label: "Implementation TCO", icon: "🏗️" },
    { id: "downtime", label: "Downtime Cost", icon: "⚡" },
    { id: "compare", label: "Compare Options", icon: "⚖️" },
  ];

  return (
    <div className="max-w-7xl mx-auto p-4 md:p-6">
      <div className="mb-4">
        <h1 className="text-3xl font-bold text-gray-800 mb-1">TCO / ROI Calculator</h1>
        <p className="text-gray-500 text-sm">Total Cost of Ownership and Return on Investment analysis with opportunity cost modeling</p>
      </div>

      <OrgSettings org={org} setOrg={setOrg} />

      <div className="flex gap-1 mb-4 overflow-x-auto no-print">
        {tabs.map((tab) => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)}
            className={`px-4 py-2.5 rounded-t-lg text-sm font-medium whitespace-nowrap transition-colors ${
              activeTab === tab.id
                ? "bg-white text-blue-600 border border-b-0 border-gray-200 shadow-sm"
                : "bg-gray-200 text-gray-600 hover:bg-gray-300"
            }`}>
            {tab.icon} {tab.label}
          </button>
        ))}
      </div>

      <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-4 md:p-6 mb-4">
        {activeTab === "recurring" && <RecurringIssueTab org={org} />}
        {activeTab === "roi" && <ImprovementROITab org={org} />}
        {activeTab === "implementation" && <ImplementationTCOTab org={org} />}
        {activeTab === "downtime" && <DowntimeCostTab org={org} />}
        {activeTab === "compare" && <CompareTab org={org} />}
      </div>

      <ActionBar />

      <div className="mt-4 text-center text-xs text-gray-400 no-print">
        TCO/ROI Calculator · Formulas based on Forrester TEI, Gartner, and industry benchmarks · Built for IT Business Analysis
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>

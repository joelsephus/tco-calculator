  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @media print {
      .no-print { display: none !important; }
      .print-break { page-break-before: always; }
      body { font-size: 11pt; line-height: 1.4; }

    }

<body class="bg-gray-100 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const SCHEMA_VERSION = 2;

// ─── Default Data ───────────────────────────────────────────
const DEFAULT_ORG = {
  orgName: "Merakey",
  totalEmployees: 70000,
  annualRevenue: "",
  benefitsMultiplier: 1.4,
  valueMultiplier: 2.0,
  billableUtilization: 0.65,
  annualWorkHours: 2080,
  discountRate: 0.08,
  contextSwitchMinutes: 15,
};

const ROLES = [
  { name: "Direct Service Provider", defaultSalary: 35000 },
  { name: "Administrative/Clerical", defaultSalary: 40000 },
  { name: "Clinical Staff", defaultSalary: 55000 },
  { name: "Management/Director", defaultSalary: 85000 },
  { name: "IT/Technical Staff", defaultSalary: 65000 },
  { name: "C-Suite/Executive", defaultSalary: 150000 },
];

const SUPPORT_TIERS = [
  { name: "Tier 1 Support", defaultSalary: 35000 },
  { name: "Tier 2 Support", defaultSalary: 55000 },
  { name: "Tier 3/Specialist", defaultSalary: 75000 },
  { name: "Manager/Director", defaultSalary: 90000 },
];

// ─── Formula Engine ─────────────────────────────────────────
function loadedHourlyCost(salary, mult, hours = 2080) {
  if (hours <= 0) return 0;
  return (Math.max(0, salary) * mult) / hours;
}

function valuePerHour(org, loadedHourly) {
  const rev = parseFloat(org.annualRevenue);
  if (rev > 0 && org.totalEmployees > 0 && org.annualWorkHours > 0) {
    const rpe = rev / org.totalEmployees;
    return (rpe * org.billableUtilization) / org.annualWorkHours;
  }
  return loadedHourly * org.valueMultiplier;
}

function calcTicket(inputs, org) {
  const custLoaded = loadedHourlyCost(inputs.customerSalary, org.benefitsMultiplier, org.annualWorkHours);
  const custValue = valuePerHour(org, custLoaded);
  const custHours = (inputs.customerTime + inputs.holdTime + (inputs.includeContextSwitch ? org.contextSwitchMinutes : 0)) / 60;

  const supLoaded = loadedHourlyCost(inputs.supportSalary, org.benefitsMultiplier, org.annualWorkHours);
  const supValue = valuePerHour(org, supLoaded);
  const supHours = inputs.supportTime / 60;

  // Advanced factors (default to zero impact if not provided)
  const adv = inputs.advanced || {};

  // Multi-touch: additional support contacts beyond the first
  const avgTouches = adv.avgSupportTouches || 1;
  const multiTouchMultiplier = avgTouches;

  // Repeat contacts: tickets that don't resolve on first contact
  const fcrRate = (adv.firstContactResolutionPct || 100) / 100;
  const repeatMultiplier = fcrRate < 1 ? 1 + (1 - fcrRate) : 1; // unresolved tickets generate another contact

  // Workaround labor: invisible cost from people who don't call
  const workaroundPct = (adv.workaroundPct || 0) / 100;
  const workaroundMinutes = adv.workaroundMinutes || 0;
  const workaroundCostPerTicket = (workaroundPct > 0 && workaroundPct < 1)
    ? (custValue * workaroundMinutes / 60) * (workaroundPct / (1 - workaroundPct))
    : 0;

  // Error/rework: downstream errors caused by the issue
  const errorRate = (adv.errorRatePct || 0) / 100;
  const reworkCostPerError = adv.reworkCostPerError || 0;
  const errorReworkCost = errorRate * reworkCostPerError;

  // Management overhead: supervisor time per escalation
  const escalationRate = (adv.escalationRatePct || 0) / 100;
  const mgrMinutes = adv.mgrMinutesPerEscalation || 0;
  const mgrLoaded = adv.mgrSalary ? loadedHourlyCost(adv.mgrSalary, org.benefitsMultiplier, org.annualWorkHours) : 0;
  const mgrCostPerTicket = escalationRate * (mgrLoaded * mgrMinutes / 60);

  // Overtime/backlog: work that must be caught up later
  const overtimePct = (adv.overtimePct || 0) / 100;
  const overtimeMultiplier = adv.overtimeRate || 1.5;
  const overtimeCost = overtimePct > 0 ? custLoaded * custHours * overtimePct * (overtimeMultiplier - 1) : 0;

  // Apply multi-touch and repeat multipliers to support cost
  const adjSupportDirect = supLoaded * supHours * multiTouchMultiplier * repeatMultiplier;
  const adjSupportOpportunity = (supValue - supLoaded) * supHours * multiTouchMultiplier * repeatMultiplier;
  const adjSupportTotal = supValue * supHours * multiTouchMultiplier * repeatMultiplier;

  const advancedTotal = workaroundCostPerTicket + errorReworkCost + mgrCostPerTicket + overtimeCost;
  const hasAdvanced = advancedTotal > 0;

  return {
    customerDirect: custLoaded * custHours,
    customerOpportunity: (custValue - custLoaded) * custHours,
    customerTotal: custValue * custHours,
    supportDirect: adjSupportDirect,
    supportOpportunity: adjSupportOpportunity,
    supportTotal: adjSupportTotal,
    resourceCost: inputs.resourceCost || 0,
    // Advanced factor breakdowns
    workaroundCost: workaroundCostPerTicket,
    errorReworkCost: errorReworkCost,
    mgrOverheadCost: mgrCostPerTicket,
    overtimeCost: overtimeCost,
    advancedTotal: advancedTotal,
    hasAdvanced: hasAdvanced,
    get perTicketDirect() { return this.customerDirect + this.supportDirect + this.resourceCost; },
    get perTicketOpportunity() { return this.customerOpportunity + this.supportOpportunity; },
    get perTicketTotal() { return this.customerTotal + this.supportTotal + this.resourceCost + this.advancedTotal; },
    get annualDirect() { return this.perTicketDirect * inputs.annualTickets; },
    get annualOpportunity() { return this.perTicketOpportunity * inputs.annualTickets; },
    get annualTotal() { return this.perTicketTotal * inputs.annualTickets; },
    get annualAdvanced() { return this.advancedTotal * inputs.annualTickets; },
  };
}

function calcROI(inputs) {
  const annualSavings = inputs.currentAnnualCost * (inputs.improvementPct / 100) * inputs.confidenceFactor;
  const netAnnualBenefit = annualSavings - inputs.annualRecurringCost;
  const paybackMonths = netAnnualBenefit > 0 ? inputs.oneTimeInvestment / (netAnnualBenefit / 12) : Infinity;
  const years = [1, 2, 3, 5];
  const npvResults = {};
  const roiResults = {};
  for (const n of years) {
    let pvBenefits = 0;
    for (let y = 1; y <= n; y++) pvBenefits += netAnnualBenefit / Math.pow(1 + inputs.discountRate, y);
    npvResults[n] = -inputs.oneTimeInvestment + pvBenefits;
    const totalBenefits = netAnnualBenefit * n;
    const totalCosts = inputs.oneTimeInvestment + inputs.annualRecurringCost * n;
    roiResults[n] = totalCosts > 0 ? ((totalBenefits - totalCosts) / totalCosts) * 100 : 0;
  }
  return { annualSavings, netAnnualBenefit, paybackMonths, npvResults, roiResults };
}

function calcImplementation(inputs, org) {
  const directCosts = inputs.softwareOnetime + inputs.services + inputs.firstYearLicensing;
  const internalLoaded = loadedHourlyCost(inputs.internalSalary, org.benefitsMultiplier, org.annualWorkHours);
  const laborCost = inputs.internalHours * internalLoaded;
  const traineeLoaded = loadedHourlyCost(inputs.traineeSalary, org.benefitsMultiplier, org.annualWorkHours);
  const trainingCost = inputs.trainingHoursPerPerson * inputs.numTrainees * traineeLoaded;
  const affectedLoaded = loadedHourlyCost(inputs.affectedSalary, org.benefitsMultiplier, org.annualWorkHours);
  const weeklyHours = org.annualWorkHours / 52;
  const productivityLoss = inputs.affectedEmployees * affectedLoaded * weeklyHours * (inputs.productivityDipPct / 100) * inputs.transitionWeeks;
  const year1Total = directCosts + laborCost + trainingCost + productivityLoss;
  const ongoingAnnual = inputs.recurringLicensing + inputs.ongoingSupport;
  const fiveYearTotal = year1Total + ongoingAnnual * 4;
  const hiddenPct = year1Total > 0 ? ((trainingCost + productivityLoss) / year1Total) * 100 : 0;
  return { directCosts, laborCost, trainingCost, productivityLoss, year1Total, ongoingAnnual, fiveYearTotal, hiddenPct };
}

function calcDowntime(inputs, org) {
  const loaded = loadedHourlyCost(inputs.avgSalary, org.benefitsMultiplier, org.annualWorkHours);
  const val = valuePerHour(org, loaded);
  const lostProdDirect = inputs.affectedEmployees * loaded * inputs.downtimeHours;
  const lostProdTotal = inputs.affectedEmployees * val * inputs.downtimeHours;
  const rev = parseFloat(org.annualRevenue);
  const lostRevenue = (rev > 0 && org.annualWorkHours > 0) ? (rev / org.annualWorkHours) * inputs.downtimeHours * (inputs.revenueImpactPct / 100) : 0;
  const eventDirect = lostProdDirect + lostRevenue + inputs.recoveryCosts;
  const eventTotal = lostProdTotal + lostRevenue + inputs.recoveryCosts;
  return {
    lostProdDirect, lostProdTotal,
    lostRevenue,
    recoveryCosts: inputs.recoveryCosts,
    eventDirect, eventTotal,
    annualDirect: eventDirect * inputs.eventsPerYear,
    annualTotal: eventTotal * inputs.eventsPerYear,
  };
}

// ─── Utility Components ─────────────────────────────────────
const fmt = (v) => !isFinite(v) ? "—" : new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);
const fmtD = (v) => !isFinite(v) ? "—" : new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v);
const fmtPct = (v) => !isFinite(v) ? "—" : `${v.toFixed(1)}%`;
const fmtNum = (v) => !isFinite(v) ? "—" : new Intl.NumberFormat("en-US").format(Math.round(v));

let _inputId = 0;
function Input({ label, value, onChange, type = "number", ...props }) {
  const [id] = useState(() => `input-${++_inputId}`);
  return (
    <div>
      <label htmlFor={id} className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
      <input id={id} type={type} value={value}
        onChange={(e) => onChange(type === "number" ? (parseFloat(e.target.value) || 0) : e.target.value)}
        {...(type === "number" ? { min: 0 } : {})}
        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" {...props} />
    </div>
  );
}

function Select({ label, value, onChange, options }) {
  const [id] = useState(() => `select-${++_inputId}`);
  return (
    <div>
      <label htmlFor={id} className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
      <select id={id} value={value} onChange={(e) => onChange(e.target.value)}
        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        {options.map((o) => <option key={o.value || o} value={o.value || o}>{o.label || o}</option>)}
      </select>
    </div>
  );
}

function CostRow({ label, direct, opportunity, total, bold = false }) {
  const cls = bold ? "font-bold text-base" : "text-sm";
  return (
    <tr className={cls}>
      <td className="py-1.5 pr-4 text-gray-700">{label}</td>
      <td className="py-1.5 px-3 text-right text-gray-600">{fmtD(direct)}</td>
      <td className="py-1.5 px-3 text-right text-amber-700">{fmtD(opportunity)}</td>
      <td className="py-1.5 px-3 text-right font-semibold text-gray-900">{fmtD(total)}</td>
    </tr>
  );
}

function ResultCard({ title, icon, color, children }) {
  const borderColor = { blue: "border-blue-200 bg-blue-50", green: "border-green-200 bg-green-50", amber: "border-amber-200 bg-amber-50", purple: "border-purple-200 bg-purple-50", red: "border-red-200 bg-red-50" }[color] || "border-gray-200 bg-gray-50";
  return (
    <div className={`p-4 rounded-lg border-2 ${borderColor}`}>
      <h3 className="text-lg font-semibold text-gray-700 mb-3 flex items-center gap-2">
        <span>{icon}</span> {title}
      </h3>
      {children}
    </div>
  );
}

function StatBox({ label, value, sublabel, color = "gray" }) {
  const textColor = { green: "text-green-600", blue: "text-blue-600", red: "text-red-600", amber: "text-amber-600", purple: "text-purple-600" }[color] || "text-gray-800";
  return (
    <div className="p-3 bg-white rounded-lg">
      <div className="text-xs text-gray-500 mb-1">{label}</div>
      <div className={`text-xl font-bold ${textColor}`}>{value}</div>
      {sublabel && <div className="text-xs text-gray-400 mt-0.5">{sublabel}</div>}
    </div>
  );
}

// ─── Org Settings Panel ─────────────────────────────────────
function OrgSettings({ org, setOrg }) {
  const [open, setOpen] = useState(false);
  const parsedRev = parseFloat(org.annualRevenue);
  const revPerEmp = (parsedRev > 0 && org.totalEmployees > 0) ? parsedRev / org.totalEmployees : null;
  const exampleLoaded = loadedHourlyCost(55000, org.benefitsMultiplier, org.annualWorkHours);
  const exampleValue = valuePerHour(org, exampleLoaded);

  return (
    <div className="mb-6 bg-white rounded-lg shadow-sm border border-gray-200 no-print">
      <button onClick={() => setOpen(!open)} className="w-full flex justify-between items-center p-4 text-left hover:bg-gray-50">
        <div>
          <span className="font-semibold text-gray-700">⚙️ Organization Settings</span>
          <span className="text-sm text-gray-500 ml-3">{org.orgName} · {fmtNum(org.totalEmployees)} employees · {org.benefitsMultiplier}x benefits</span>
        </div>
        <span className="text-gray-400">{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div className="p-4 pt-0 border-t border-gray-100">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
            <Input label="Organization Name" type="text" value={org.orgName} onChange={(v) => setOrg({ ...org, orgName: v })} />
            <Input label="Total Employees" value={org.totalEmployees} onChange={(v) => setOrg({ ...org, totalEmployees: v })} />
            <Input label="Annual Revenue ($, optional)" value={org.annualRevenue} onChange={(v) => setOrg({ ...org, annualRevenue: v })} />
            <Input label="Annual Work Hours" value={org.annualWorkHours} onChange={(v) => setOrg({ ...org, annualWorkHours: v })} />
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Benefits Multiplier: {org.benefitsMultiplier}x</label>
              <input type="range" min="1.0" max="2.0" step="0.05" value={org.benefitsMultiplier}
                onChange={(e) => setOrg({ ...org, benefitsMultiplier: parseFloat(e.target.value) })} className="w-full" />
              <div className="flex justify-between text-xs text-gray-400"><span>1.0x</span><span>2.0x</span></div>
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Value Multiplier: {org.valueMultiplier}x</label>
              <input type="range" min="1.0" max="4.0" step="0.1" value={org.valueMultiplier}
                onChange={(e) => setOrg({ ...org, valueMultiplier: parseFloat(e.target.value) })} className="w-full" />
              <div className="flex justify-between text-xs text-gray-400"><span>1.0x (conservative)</span><span>4.0x</span></div>
            </div>
            <Input label="Billable Utilization %" value={Math.round(org.billableUtilization * 100)}
              onChange={(v) => setOrg({ ...org, billableUtilization: v / 100 })} />
            <Input label="Context Switch Penalty (min)" value={org.contextSwitchMinutes}
              onChange={(v) => setOrg({ ...org, contextSwitchMinutes: v })} />
          </div>
          <div className="bg-gray-50 rounded-lg p-3 text-sm text-gray-600 grid grid-cols-2 md:grid-cols-4 gap-3">
            <div><span className="font-medium">Example ($55K clinical):</span></div>
            <div>Loaded hourly: <strong>{fmtD(exampleLoaded)}</strong></div>
            <div>Value/hour: <strong>{fmtD(exampleValue)}</strong> {!org.annualRevenue && <span className="text-xs text-amber-600">(multiplier-based)</span>}</div>
            {revPerEmp && <div>Revenue/employee: <strong>{fmt(revPerEmp)}</strong></div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Tab 1: Recurring Issue Cost ────────────────────────────
function RecurringIssueTab({ org }) {
  const [inputs, setInputs] = useState({
    problemName: "Avatar Access Issues",
    customerRole: "Clinical Staff",
    customerSalary: 55000,
    customerTime: 10,
    holdTime: 15,
    includeContextSwitch: true,
    supportTier: "Tier 1 Support",
    supportSalary: 35000,
    supportTime: 5,
    resourceCost: 0,
    annualTickets: 1904,
    reductionPct: 10,
    advanced: {
      avgSupportTouches: 1,
      firstContactResolutionPct: 100,
      workaroundPct: 0,
      workaroundMinutes: 0,
      errorRatePct: 0,
      reworkCostPerError: 0,
      escalationRatePct: 0,
      mgrMinutesPerEscalation: 0,
      mgrSalary: 85000,
      overtimePct: 0,
      overtimeRate: 1.5,
    },
  });
  const [advOpen, setAdvOpen] = useState(false);

  const set = (field, value) => setInputs((p) => ({ ...p, [field]: value }));
  const setAdv = (field, value) => setInputs((p) => ({ ...p, advanced: { ...p.advanced, [field]: value } }));

  const handleRoleChange = (role) => {
    const r = ROLES.find((r) => r.name === role);
    set("customerRole", role);
    if (r) set("customerSalary", r.defaultSalary);
  };

  const handleTierChange = (tier) => {
    const t = SUPPORT_TIERS.find((t) => t.name === tier);
    set("supportTier", tier);
    if (t) set("supportSalary", t.defaultSalary);
  };

  const r = useMemo(() => calcTicket(inputs, org), [inputs, org]);

  const copyResults = () => {
    const lines = [
      `TCO Analysis: ${inputs.problemName}`,
      `Date: ${new Date().toLocaleDateString()}`,
      `Org: ${org.orgName}`,
      "",
      "PER TICKET BREAKDOWN",
      `${"".padEnd(25)} ${"Direct".padStart(12)} ${"Opp. Cost".padStart(12)} ${"Total".padStart(12)}`,
      `${"Customer Cost".padEnd(25)} ${fmtD(r.customerDirect).padStart(12)} ${fmtD(r.customerOpportunity).padStart(12)} ${fmtD(r.customerTotal).padStart(12)}`,
      `${"Support Cost".padEnd(25)} ${fmtD(r.supportDirect).padStart(12)} ${fmtD(r.supportOpportunity).padStart(12)} ${fmtD(r.supportTotal).padStart(12)}`,
      `${"Resource Cost".padEnd(25)} ${fmtD(r.resourceCost).padStart(12)} ${"—".padStart(12)} ${fmtD(r.resourceCost).padStart(12)}`,
    ];
    if (r.hasAdvanced) {
      lines.push("", "HIDDEN COST FACTORS (per ticket)");
      if (r.workaroundCost > 0) lines.push(`${"  Workaround Labor".padEnd(25)} ${fmtD(r.workaroundCost).padStart(12)}`);
      if (r.errorReworkCost > 0) lines.push(`${"  Error/Rework".padEnd(25)} ${fmtD(r.errorReworkCost).padStart(12)}`);
      if (r.mgrOverheadCost > 0) lines.push(`${"  Mgmt Overhead".padEnd(25)} ${fmtD(r.mgrOverheadCost).padStart(12)}`);
      if (r.overtimeCost > 0) lines.push(`${"  Overtime/Backlog".padEnd(25)} ${fmtD(r.overtimeCost).padStart(12)}`);
      lines.push(`${"  TOTAL HIDDEN".padEnd(25)} ${fmtD(r.advancedTotal).padStart(12)}`);
    }
    lines.push(
      "",
      `${"TOTAL PER TICKET".padEnd(25)} ${fmtD(r.perTicketDirect).padStart(12)} ${fmtD(r.perTicketOpportunity).padStart(12)} ${fmtD(r.perTicketTotal).padStart(12)}`,
      "",
      `Annual Volume: ${fmtNum(inputs.annualTickets)} tickets`,
      `Annual Cost (Conservative): ${fmt(r.annualDirect)}`,
      `Annual Cost (Full Impact): ${fmt(r.annualTotal)}`,
    );
    if (r.hasAdvanced) lines.push(`Annual Hidden Costs: ${fmt(r.annualAdvanced)}`);
    lines.push("", `${inputs.reductionPct}% Reduction Value: ${fmt(r.annualTotal * inputs.reductionPct / 100)}/year`);
    navigator.clipboard.writeText(lines.join("\n"));
  };

  return (
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div className="space-y-4">
        <div className="bg-gray-50 p-4 rounded-lg space-y-3">
          <h3 className="font-semibold text-gray-700">Issue Details</h3>
          <Input label="Problem/Issue Name" type="text" value={inputs.problemName} onChange={(v) => set("problemName", v)} />
          <Input label="Annual Ticket Volume" value={inputs.annualTickets} onChange={(v) => set("annualTickets", v)} />
        </div>
        <div className="bg-gray-50 p-4 rounded-lg space-y-3">
          <h3 className="font-semibold text-gray-700">Customer Impact</h3>
          <Select label="Customer Role" value={inputs.customerRole} onChange={handleRoleChange}
            options={ROLES.map((r) => ({ value: r.name, label: `${r.name} (${fmt(r.defaultSalary)})` }))} />
          <Input label="Customer Base Salary" value={inputs.customerSalary} onChange={(v) => set("customerSalary", v)} />
          <Input label="Active Time with Issue (min)" value={inputs.customerTime} onChange={(v) => set("customerTime", v)} />
          <Input label="Hold/Wait Time (min)" value={inputs.holdTime} onChange={(v) => set("holdTime", v)} />
          <label className="flex items-center gap-2 text-sm text-gray-600">
            <input type="checkbox" checked={inputs.includeContextSwitch}
              onChange={(e) => set("includeContextSwitch", e.target.checked)} />
            Include context-switch penalty (+{org.contextSwitchMinutes} min)
          </label>
        </div>
        <div className="bg-gray-50 p-4 rounded-lg space-y-3">
          <h3 className="font-semibold text-gray-700">IT Support Impact</h3>
          <Select label="Support Tier" value={inputs.supportTier} onChange={handleTierChange}
            options={SUPPORT_TIERS.map((t) => ({ value: t.name, label: `${t.name} (${fmt(t.defaultSalary)})` }))} />
          <Input label="Support Staff Base Salary" value={inputs.supportSalary} onChange={(v) => set("supportSalary", v)} />
          <Input label="Support Resolution Time (min)" value={inputs.supportTime} onChange={(v) => set("supportTime", v)} />
          <Input label="Additional Resource Cost per Ticket ($)" value={inputs.resourceCost} onChange={(v) => set("resourceCost", v)} />
        </div>

        <div className="bg-amber-50 border border-amber-200 rounded-lg overflow-hidden">
          <button onClick={() => setAdvOpen(!advOpen)}
            className="w-full flex justify-between items-center p-4 text-left hover:bg-amber-100 transition-colors">
            <div>
              <span className="font-semibold text-amber-800">🔍 Advanced Hidden Cost Factors</span>
              {r.hasAdvanced && <span className="text-sm text-amber-600 ml-2">+{fmtD(r.advancedTotal)}/ticket</span>}
            </div>
            <span className="text-amber-400">{advOpen ? "▲" : "▼"}</span>
          </button>
          {advOpen && (
            <div className="p-4 pt-0 space-y-4">
              <p className="text-xs text-amber-700">These factors capture costs that are typically invisible in standard TCO analysis. Leave at default values to exclude.</p>

              <div className="bg-white rounded-lg p-3 space-y-3">
                <h4 className="text-sm font-semibold text-gray-700">Repeat Contacts & Multi-Touch</h4>
                <div className="grid grid-cols-2 gap-3">
                  <Input label="First Contact Resolution %" value={inputs.advanced.firstContactResolutionPct}
                    onChange={(v) => setAdv("firstContactResolutionPct", v)} />

}

        <ResultCard title="Payback & ROI" icon="🎯" color="blue">

              <th className="py-1 text-left">Horizon</th><th className="py-1 text-right">NPV</th><th className="py-1 text-right">ROI</th>

                  <td className="py-1 text-right">{fmtPct(r.roiResults[y])}</td>
                </tr>

        </ResultCard>

        <ResultCard title="Decision Summary" icon="📝" color={r.npvResults[3] > 0 ? "green" : "red"}>
          <div className="text-sm text-gray-700 space-y-2">
            {r.paybackMonths <= 12 && <p>✅ <strong>Strong investment.</strong> Pays for itself in under 12 months.</p>}
            {r.paybackMonths > 12 && r.paybackMonths <= 36 && <p>🟡 <strong>Reasonable investment.</strong> Payback in {r.paybackMonths.toFixed(0)} months — confirm strategic alignment.</p>}

            </p>
          </div>
        </ResultCard>
      </div>
    </div>
  );
}

        <div className="bg-gray-50 p-4 rounded-lg space-y-3">
          <h3 className="font-semibold text-gray-700">Additional Impacts</h3>
          <Input label="Revenue Impact (%)" value={inputs.revenueImpactPct} onChange={(v) => set("revenueImpactPct", v)} />
          {!org.annualRevenue && <p className="text-xs text-amber-600">Enter org revenue in settings above to calculate revenue loss.</p>}
          <Input label="Recovery/Remediation Costs ($)" value={inputs.recoveryCosts} onChange={(v) => set("recoveryCosts", v)} />
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Expected Events per Year: {inputs.eventsPerYear}</label>
            <input type="range" min="1" max="52" step="1" value={inputs.eventsPerYear}
              onChange={(e) => set("eventsPerYear", parseInt(e.target.value))} className="w-full" />
          </div>
        </div>
      </div>

      <div className="space-y-4">
        <ResultCard title="Per-Event Cost" icon="⚡" color="red">
          <div className="space-y-2 text-sm">
            <div className="flex justify-between">
              <span className="text-gray-600">Lost Productivity (Direct)</span>
              <span className="font-semibold">{fmt(r.lostProdDirect)}</span>
            </div>
            <div className="flex justify-between">
              <span className="text-gray-600">Lost Productivity (Full Impact)</span>
              <span className="font-semibold text-amber-600">{fmt(r.lostProdTotal)}</span>
            </div>
            {r.lostRevenue > 0 && <div className="flex justify-between">
              <span className="text-gray-600">Lost Revenue</span>
              <span className="font-semibold">{fmt(r.lostRevenue)}</span>
            </div>}
            {r.recoveryCosts > 0 && <div className="flex justify-between">
              <span className="text-gray-600">Recovery Costs</span>
              <span className="font-semibold">{fmt(r.recoveryCosts)}</span>
            </div>}
            <hr className="border-gray-300" />
            <div className="flex justify-between font-bold">
              <span>Total per Event (Conservative)</span>
              <span className="text-blue-600">{fmt(r.eventDirect)}</span>
            </div>
            <div className="flex justify-between font-bold">
              <span>Total per Event (Full Impact)</span>
              <span className="text-red-600">{fmt(r.eventTotal)}</span>
            </div>
          </div>
          <div className="mt-3 text-xs text-gray-500">
            Cost per minute of downtime: {fmtD(r.eventTotal / (inputs.downtimeHours * 60))}
          </div>
        </ResultCard>

        <ResultCard title="Annualized Impact" icon="📆" color="purple">
          <div className="grid grid-cols-2 gap-3">
            <StatBox label={`Conservative (${inputs.eventsPerYear} events/yr)`} value={fmt(r.annualDirect)} color="blue" />
            <StatBox label={`Full Impact (${inputs.eventsPerYear} events/yr)`} value={fmt(r.annualTotal)} color="red" />
          </div>
        </ResultCard>

        <ResultCard title="Prevention ROI" icon="🛡️" color="green">
          <div className="text-sm text-gray-700 space-y-2">
            <p>Eliminating these events saves <strong>{fmt(r.annualTotal)}/year</strong> (full impact).</p>
            <p>An investment of up to <strong>{fmt(r.annualTotal * 3)}</strong> would pay for itself within 3 years.</p>
            {inputs.downtimeHours >= 4 && <p className="text-amber-700">⚠️ Extended outages ({inputs.downtimeHours}+ hours) may also incur compliance, patient safety, and reputational costs not captured here.</p>}
          </div>
        </ResultCard>
      </div>
    </div>
  );
}

// ─── Scenario Manager ───────────────────────────────────────
function ActionBar() {
  return (
    <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-4 no-print">
      <div className="flex items-center gap-3 flex-wrap">
        <button onClick={() => window.print()} className="px-3 py-1.5 bg-gray-200 text-gray-700 rounded text-sm hover:bg-gray-300">🖨️ Print / Save PDF</button>
        <span className="text-xs text-gray-400">Tip: Use your browser's Print → Save as PDF for a clean export. All inputs are kept in your browser between sessions.</span>
      </div>
    </div>
  );
}

// ─── Main App ───────────────────────────────────────────────
function App() {
  const [org, setOrg] = useState(() => {
    try {
      const saved = localStorage.getItem("tco_org_settings");
      if (!saved) return { ...DEFAULT_ORG, _v: SCHEMA_VERSION };
      const parsed = JSON.parse(saved);
      if (!parsed._v || parsed._v < SCHEMA_VERSION) return { ...DEFAULT_ORG, _v: SCHEMA_VERSION };
      return { ...DEFAULT_ORG, ...parsed, _v: SCHEMA_VERSION };
    } catch { return { ...DEFAULT_ORG, _v: SCHEMA_VERSION }; }
  });

  const [activeTab, setActiveTab] = useState("recurring");

  useEffect(() => {
    localStorage.setItem("tco_org_settings", JSON.stringify(org));
  }, [org]);

  const tabs = [
    { id: "recurring", label: "Recurring Issue Cost", icon: "🔄" },
    { id: "roi", label: "Improvement ROI", icon: "📈" },
    { id: "implementation", label: "Implementation TCO", icon: "🏗️" },
    { id: "downtime", label: "Downtime Cost", icon: "⚡" },
  ];

  return (
    <div className="max-w-7xl mx-auto p-4 md:p-6">
      <div className="mb-4">
        <h1 className="text-3xl font-bold text-gray-800 mb-1">TCO / ROI Calculator</h1>
        <p className="text-gray-500 text-sm">Total Cost of Ownership and Return on Investment analysis with opportunity cost modeling</p>
      </div>

      <OrgSettings org={org} setOrg={setOrg} />

      <div className="flex gap-1 mb-4 overflow-x-auto no-print">
        {tabs.map((tab) => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)}
            className={`px-4 py-2.5 rounded-t-lg text-sm font-medium whitespace-nowrap transition-colors ${
              activeTab === tab.id
                ? "bg-white text-blue-600 border border-b-0 border-gray-200 shadow-sm"
                : "bg-gray-200 text-gray-600 hover:bg-gray-300"
            }`}>
            {tab.icon} {tab.label}
          </button>
        ))}
      </div>

      <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-4 md:p-6 mb-4">
        {activeTab === "recurring" && <RecurringIssueTab org={org} />}
        {activeTab === "roi" && <ImprovementROITab org={org} />}
        {activeTab === "implementation" && <ImplementationTCOTab org={org} />}
        {activeTab === "downtime" && <DowntimeCostTab org={org} />}
      </div>

      <ActionBar />

      <div className="mt-4 text-center text-xs text-gray-400 no-print">
        TCO/ROI Calculator · Formulas based on Forrester TEI, Gartner, and industry benchmarks · Built for IT Business Analysis
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
